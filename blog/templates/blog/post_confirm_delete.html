{% extends 'blog/base.html' %}
{% block title %}Delete Post{% endblock %}

{% block content %}
<div class="max-w-md mx-auto glass-card p-8 text-center">
    <h1 class="text-2xl font-bold mb-4">Delete Post</h1>
    <p>Are you sure you want to delete "<strong>{{ object.title }}</strong>"?</p>
    <form method="post" class="mt-6">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 px-6 py-2 rounded-full hover:bg-red-700 transition">Yes, Delete</button>
        <a href="{% url 'dashboard' %}" class="ml-4 text-gray-400 hover:text-white">Cancel</a>
    </form>
</div>
{% endblock %}
