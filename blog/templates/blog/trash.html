{% extends 'blog/base.html' %}
{% block title %}Trash{% endblock %}

{% block content %}
<div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Trash</h1>
    {% if posts %}
        <div class="space-y-4">
            {% for post in posts %}
                <div class="bg-white rounded shadow p-4">
                    <h2 class="text-xl font-semibold">{{ post.title }}</h2>
                    <p class="text-gray-600">Deleted on {{ post.deleted_at|date:"M d, Y" }}</p>
                    <div class="mt-2 space-x-2">
                        <a href="{% url 'post_restore' post.pk %}" class="text-blue-600 hover:underline">Restore</a>
                        <a href="{% url 'post_delete_permanent' post.pk %}" class="text-red-600 hover:underline" onclick="return confirm('Permanently delete? This cannot be undone.');">Delete forever</a>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>Your trash is empty.</p>
    {% endif %}
</div>
{% endblock %}
