{% extends 'blog/base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto glass-card p-8">
    <h2 class="text-2xl font-bold mb-6 text-center">Login to Your Account</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block mb-1">Username</label>
            <input type="text" name="username" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-400">
        </div>
        <div class="mb-6">
            <label class="block mb-1">Password</label>
            <input type="password" name="password" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-400">
        </div>
        <button type="submit" class="w-full bg-purple-600 py-2 rounded-full hover:bg-purple-700 transition">Login</button>
    </form>
    <p class="text-center mt-4">Don't have an account? <a href="{% url 'signup' %}" class="text-purple-300">Sign up</a></p>
</div>
{% endblock %}
