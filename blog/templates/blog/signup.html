{% extends 'blog/base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="max-w-md mx-auto glass-card p-8">
    <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-4">
                <label class="block mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-400 text-sm">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-purple-600 py-2 rounded-full hover:bg-purple-700 transition">Sign Up</button>
    </form>
    <p class="text-center mt-4">Already have an account? <a href="{% url 'login' %}" class="text-purple-300">Login</a></p>
</div>
{% endblock %}
