{% extends 'blog/base.html' %}
{% block title %}Delete Comment{% endblock %}

{% block content %}
<div class="max-w-md mx-auto glass-card p-8 text-center">
    <h1 class="text-2xl font-bold mb-4">Delete Comment</h1>
    <p>Are you sure you want to delete this comment?</p>
    <div class="bg-white/10 p-4 rounded my-4">
        {{ object.content }}
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 px-6 py-2 rounded-full hover:bg-red-700 transition">Yes, Delete</button>
        <a href="{% url 'post_detail' object.post.pk %}" class="ml-4 text-gray-400 hover:text-white">Cancel</a>
    </form>
</div>
{% endblock %}
